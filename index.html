<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>升级 (Tractor)</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <div id="game-table">
      <!-- Top: Partner (AI) -->
      <div class="player-area" id="player-north">
        <div class="player-info">
          <span class="player-name">同伴 (AI)</span>
        </div>
        <div class="player-cards" id="cards-north"></div>
      </div>

      <!-- Left: Opponent (AI) -->
      <div class="player-area side" id="player-west">
        <div class="player-info">
          <span class="player-name">对手A (AI)</span>
        </div>
        <div class="player-cards" id="cards-west"></div>
      </div>

      <!-- Center: Play area -->
      <div id="center-area">
        <div id="trick-display">
          <div class="trick-card" id="trick-north"></div>
          <div class="trick-row">
            <div class="trick-card" id="trick-west"></div>
            <div class="trick-card" id="trick-east"></div>
          </div>
          <div class="trick-card" id="trick-south"></div>
        </div>
        <div id="game-info">
          <span id="trump-info">主牌: --</span>
          <span id="score-info">得分: 0</span>
        </div>
      </div>

      <!-- Right: Opponent (AI) -->
      <div class="player-area side" id="player-east">
        <div class="player-info">
          <span class="player-name">对手B (AI)</span>
        </div>
        <div class="player-cards" id="cards-east"></div>
      </div>

      <!-- Bottom: Human player -->
      <div class="player-area" id="player-south">
        <div class="player-info">
          <span class="player-name">你</span>
        </div>
        <div class="player-cards hand" id="cards-south"></div>
        <div id="action-bar">
          <button id="btn-play" disabled>出牌</button>
        </div>
      </div>
    </div>

    <!-- Side panels -->
    <div id="side-panel">
      <div id="scoreboard">
        <h3>记分板</h3>
        <div id="level-display">
          <div>庄家方: <span id="level-declarer">2</span></div>
          <div>防守方: <span id="level-defender">2</span></div>
        </div>
        <div id="current-scores"></div>
      </div>
      <div id="game-log">
        <h3>出牌记录</h3>
        <div id="log-entries"></div>
      </div>
      <button id="btn-new-game">🔄 新游戏</button>
    </div>
  </div>

  <script type="module" src="/static/main.js"></script>
</body>
</html>
